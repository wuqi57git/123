<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞机大战</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="480" height="640"></canvas>
        <div class="ui">
            <div class="score">分数: <span id="score">0</span></div>
            <div class="lives" id="lives">❤️❤️❤️</div>
        </div>
        <div class="start-screen" id="startScreen">
            <h1>飞机大战</h1>
            <p class="instructions">操作说明</p>
            <p>↑↓←→ 控制移动</p>
            <p>空格键 发射子弹</p>
            <p>ESC 暂停游戏</p>
            <button id="startBtn">开始游戏</button>
            <p class="hint">或按 Enter 键开始</p>
        </div>
        <div class="pause-screen" id="pauseScreen">
            <h1>游戏暂停</h1>
            <button id="resumeBtn">继续游戏</button>
            <p class="hint">或按 ESC 键继续</p>
        </div>
        <div class="game-over-screen" id="gameOverScreen">
            <h1>游戏结束</h1>
            <p class="final-score">最终得分: <span id="finalScore">0</span></p>
            <button id="restartBtn">重新开始</button>
            <p class="hint">或按 Enter 键重新开始</p>
        </div>
        <div class="instructions-bottom">
            ↑↓←→ 移动 | 空格 射击 | ESC 暂停
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
